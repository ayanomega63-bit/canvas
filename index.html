<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Canvas Login</title>
<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  background:#eee;
}
canvas{
  border:1px solid #ccc;
}
</style>
</head>

<body>

<canvas id="uiCanvas" width="2048" height="1111"></canvas>

<script>

const canvas = document.getElementById("uiCanvas");
const ctx = canvas.getContext("2d");

const bg = new Image();
bg.src = "background.png"; // replace with your image file

let state = {
  username: "",
  password: "",
  focus: null
};

const usernameBox = {x:1220, y:250, w:620, h:70};
const passwordBox = {x:1220, y:350, w:620, h:70};
const loginBtn = {x:1210, y:445, w:765, h:70};

function drawRoundedRect(x,y,w,h,r,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.fill();
}

function drawUI(){

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(bg,0,0,canvas.width,canvas.height);

  drawRoundedRect(usernameBox.x,usernameBox.y,usernameBox.w,usernameBox.h,15,"rgba(255,255,255,0.9)");
  drawRoundedRect(passwordBox.x,passwordBox.y,passwordBox.w,passwordBox.h,15,"rgba(255,255,255,0.9)");
  drawRoundedRect(loginBtn.x,loginBtn.y,loginBtn.w,loginBtn.h,20,"#8fa9d6");

  ctx.fillStyle="#000";
  ctx.font="24px Arial";

  ctx.fillText(state.username, usernameBox.x+20, usernameBox.y+42);

  let hiddenPass="*".repeat(state.password.length);
  ctx.fillText(hiddenPass, passwordBox.x+20, passwordBox.y+42);

  ctx.fillStyle="#fff";
  ctx.font="28px Arial";
  ctx.fillText("Log in", loginBtn.x + loginBtn.w/2 - 40, loginBtn.y+45);
}

canvas.addEventListener("mousedown", e=>{

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if(inBox(x,y,usernameBox)) state.focus="username";
  else if(inBox(x,y,passwordBox)) state.focus="password";
  else if(inBox(x,y,loginBtn)) handleLogin();
  else state.focus=null;

  drawUI();

});

function inBox(x,y,box){
  return x>box.x && x<box.x+box.w && y>box.y && y<box.y+box.h;
}

window.addEventListener("keydown", e=>{

  if(!state.focus) return;

  if(e.key==="Backspace"){
    state[state.focus]=state[state.focus].slice(0,-1);
  }
  else if(e.key.length===1){
    state[state.focus]+=e.key;
  }

  drawUI();

});

function handleLogin(){

  const data = {
    username: state.username,
    password: state.password,
    time: new Date().toISOString()
  };

  let saved = JSON.parse(localStorage.getItem("canvasLogins")) || [];

  saved.push(data);

  localStorage.setItem("canvasLogins", JSON.stringify(saved));

  console.log("Saved logins:", saved);

  alert("Login stored in browser storage");

}

bg.onload = drawUI;

</script>

</body>
</html>
